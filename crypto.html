<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crypto">
<meta name="theme-color" content="#0a0a0a">
<title>Crypto Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;
  --accent:#c8f058;--accent2:#58c8f0;--accent3:#f058c8;--accent4:#f0a858;
  --text:#f0f0f0;--muted:#666;--danger:#f05858;--green:#4ade80;
  --safe:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100dvh;display:flex;flex-direction:column;}

/* Header */
.header{padding:52px 20px 16px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;gap:12px;}
.header-left{display:flex;align-items:center;gap:10px;}
.back-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.page-title{font-size:24px;font-weight:800;}
.refresh-btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap;}
.refresh-btn:disabled{opacity:.4;cursor:default;}

/* Currency toggle */
.currency-row{display:flex;gap:6px;padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.cur-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;text-align:center;}
.cur-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}

/* Portfolio summary */
.summary{padding:20px;background:var(--surface);border-bottom:1px solid var(--border);}
.summary-total-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.summary-total{font-size:36px;font-weight:800;line-height:1;}
.summary-row{display:flex;gap:16px;margin-top:10px;}
.summary-stat{flex:1;}
.summary-stat-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}
.summary-stat-val{font-size:15px;font-weight:700;}
.up{color:var(--green);}
.down{color:var(--danger);}
.neutral{color:var(--muted);}

/* Last updated */
.last-updated{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);padding:8px 20px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--accent4);display:inline-block;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Coin list */
.coin-list{flex:1;overflow-y:auto;padding:16px 20px;padding-bottom:calc(80px + var(--safe));}

.coin-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;}
.coin-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.coin-card.up-card::before{background:var(--green);}
.coin-card.down-card::before{background:var(--danger);}
.coin-card.neutral-card::before{background:var(--border);}

.coin-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.coin-icon{width:40px;height:40px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0;overflow:hidden;}
.coin-icon img{width:100%;height:100%;border-radius:50%;}
.coin-info{flex:1;}
.coin-name{font-size:15px;font-weight:800;}
.coin-symbol{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;}
.coin-price-col{text-align:right;}
.coin-price{font-size:18px;font-weight:800;font-family:'DM Mono',monospace;}
.coin-change{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:2px;}
.arrow-up::before{content:'▲';font-size:9px;}
.arrow-down::before{content:'▼';font-size:9px;}

/* Mini chart placeholder */
.coin-bottom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:12px;border-top:1px solid var(--border);}
.coin-stat{text-align:center;}
.coin-stat-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.coin-stat-val{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;}

/* Holdings row */
.coin-holdings{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);margin-top:10px;}
.coin-holdings-left{}
.coin-holdings-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.coin-holdings-amount{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;}
.coin-holdings-right{text-align:right;}
.coin-holdings-value{font-size:15px;font-weight:800;}
.coin-holdings-pnl{font-size:12px;font-family:'DM Mono',monospace;font-weight:700;margin-top:1px;}

/* Sparkline */
.sparkline{height:36px;margin:8px 0 2px;}
.sparkline svg{width:100%;height:100%;}

/* FAB */
.fab{position:fixed;bottom:calc(24px + var(--safe));right:20px;width:56px;height:56px;border-radius:16px;background:var(--accent);border:none;cursor:pointer;font-size:26px;color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:10;transition:transform .1s;box-shadow:0 4px 24px rgba(200,240,88,.25);}
.fab:active{transform:scale(.94);}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:24px 20px calc(24px + var(--safe));width:100%;max-width:480px;animation:sup .22s ease;max-height:85dvh;overflow-y:auto;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:18px;font-weight:800;margin-bottom:20px;}
.mlbl{font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
.minput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:15px;font-weight:600;margin-bottom:16px;outline:none;-webkit-appearance:none;}
.minput:focus{border-color:var(--accent);}
.msearch-results{background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-top:-10px;margin-bottom:16px;max-height:180px;overflow-y:auto;display:none;}
.msearch-results.open{display:block;}
.msearch-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.msearch-item:last-child{border-bottom:none;}
.msearch-item:hover{background:var(--surface);}
.msearch-sym{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);width:60px;}
.msearch-name{font-size:13px;font-weight:600;}
.mekle{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px;}
.miptal{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.del-coin-btn{width:100%;padding:10px;border-radius:10px;border:1px solid var(--danger);background:transparent;color:var(--danger);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state-icon{font-size:48px;margin-bottom:12px;}
.empty-state-text{font-size:14px;line-height:1.6;}

.error-banner{background:#2a1010;border:1px solid var(--danger);border-radius:10px;padding:12px 16px;margin:12px 20px;font-size:12px;color:var(--danger);display:none;}
.error-banner.visible{display:block;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="back-btn" href="./index.html">← Planner</a>
    <div class="page-title">Crypto</div>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="fetchPrices()">↻ Refresh</button>
</div>

<div class="currency-row">
  <button class="cur-btn active" data-cur="usd" onclick="setCur(this)">USD $</button>
  <button class="cur-btn" data-cur="eur" onclick="setCur(this)">EUR €</button>
  <button class="cur-btn" data-cur="try" onclick="setCur(this)">TRY ₺</button>
  <button class="cur-btn" data-cur="btc" onclick="setCur(this)">BTC ₿</button>
</div>

<div class="summary" id="summary">
  <div class="summary-total-label">Total Portfolio Value</div>
  <div class="summary-total" id="total-val">—</div>
  <div class="summary-row">
    <div class="summary-stat">
      <div class="summary-stat-label">24h Change</div>
      <div class="summary-stat-val" id="total-change">—</div>
    </div>
    <div class="summary-stat">
      <div class="summary-stat-label">All-time P&L</div>
      <div class="summary-stat-val" id="total-pnl">—</div>
    </div>
    <div class="summary-stat">
      <div class="summary-stat-label">Holdings</div>
      <div class="summary-stat-val" id="total-count">—</div>
    </div>
  </div>
</div>

<div class="last-updated" id="last-updated-row">
  <span id="last-updated-text">Not yet refreshed</span>
  <span id="loading-indicator" style="display:none"><span class="loading-dot"></span> Fetching...</span>
</div>

<div class="error-banner" id="error-banner"></div>

<div class="coin-list" id="coin-list">
  <div class="empty-state">
    <div class="empty-state-icon">₿</div>
    <div class="empty-state-text">No coins yet.<br>Tap + to add your first holding.</div>
  </div>
</div>

<button class="fab" onclick="openAddModal()">+</button>

<!-- Add / Edit Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeMod(event)">
  <div class="modal">
    <div class="mtitle" id="modal-title">Add Coin</div>

    <div id="search-section">
      <div class="mlbl">Search coin</div>
      <input class="minput" id="coin-search" type="text" placeholder="Bitcoin, ETH, BNB..." autocomplete="off" oninput="searchCoins(this.value)">
      <div class="msearch-results" id="search-results"></div>
    </div>

    <div id="selected-coin-row" style="display:none;padding:10px 14px;background:var(--surface2);border-radius:10px;margin-bottom:16px;display:none;align-items:center;gap:10px;">
      <div style="font-size:20px" id="sel-icon">₿</div>
      <div>
        <div style="font-size:14px;font-weight:800" id="sel-name">—</div>
        <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)" id="sel-sym">—</div>
      </div>
    </div>

    <div class="mlbl">Amount you hold</div>
    <input class="minput" id="coin-amount" type="number" placeholder="e.g. 0.5" step="any" min="0">

    <div class="mlbl">Average buy price (USD, optional)</div>
    <input class="minput" id="coin-buyprice" type="number" placeholder="e.g. 42000" step="any" min="0">

    <button class="mekle" onclick="saveCoin()">Add to Portfolio</button>
    <button class="miptal" onclick="closeMod()">Cancel</button>
    <button class="del-coin-btn" id="del-coin-btn" style="display:none" onclick="deleteCoin()">Remove from Portfolio</button>
  </div>
</div>

<script>
const CUR_SYMBOLS={usd:'$',eur:'€',try:'₺',btc:'₿'};
const CUR_DECIMALS={usd:2,eur:2,try:0,btc:6};

let portfolio=JSON.parse(localStorage.getItem('crypto_portfolio')||'[]');
let prices={};
let currency=localStorage.getItem('crypto_cur')||'usd';
let editingId=null;
let searchTimer=null;
let searchCache={};

// Popular coins for quick search
const POPULAR=[
  {id:'bitcoin',symbol:'BTC',name:'Bitcoin'},
  {id:'ethereum',symbol:'ETH',name:'Ethereum'},
  {id:'binancecoin',symbol:'BNB',name:'BNB'},
  {id:'solana',symbol:'SOL',name:'Solana'},
  {id:'ripple',symbol:'XRP',name:'XRP'},
  {id:'cardano',symbol:'ADA',name:'Cardano'},
  {id:'dogecoin',symbol:'DOGE',name:'Dogecoin'},
  {id:'avalanche-2',symbol:'AVAX',name:'Avalanche'},
  {id:'polkadot',symbol:'DOT',name:'Polkadot'},
  {id:'tron',symbol:'TRX',name:'TRON'},
  {id:'chainlink',symbol:'LINK',name:'Chainlink'},
  {id:'matic-network',symbol:'MATIC',name:'Polygon'},
  {id:'litecoin',symbol:'LTC',name:'Litecoin'},
  {id:'shiba-inu',symbol:'SHIB',name:'Shiba Inu'},
  {id:'toncoin',symbol:'TON',name:'Toncoin'},
  {id:'stellar',symbol:'XLM',name:'Stellar'},
  {id:'uniswap',symbol:'UNI',name:'Uniswap'},
  {id:'the-open-network',symbol:'TON',name:'TON'},
  {id:'pepe',symbol:'PEPE',name:'Pepe'},
  {id:'near',symbol:'NEAR',name:'NEAR Protocol'},
];

function fmtPrice(val,cur,short=false){
  if(val===undefined||val===null)return '—';
  const sym=CUR_SYMBOLS[cur];
  const dec=CUR_DECIMALS[cur];
  if(cur==='btc'){return sym+val.toFixed(6);}
  if(short&&Math.abs(val)>=1e9)return sym+(val/1e9).toFixed(2)+'B';
  if(short&&Math.abs(val)>=1e6)return sym+(val/1e6).toFixed(2)+'M';
  if(short&&Math.abs(val)>=1e3)return sym+val.toLocaleString('en-US',{maximumFractionDigits:0});
  return sym+val.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}

function fmtChange(pct){
  if(pct===undefined||pct===null)return {text:'—',cls:'neutral'};
  const sign=pct>=0?'+':'';
  const cls=pct>0?'up':pct<0?'down':'neutral';
  const arrow=pct>0?'arrow-up':pct<0?'arrow-down':'';
  return {text:sign+pct.toFixed(2)+'%',cls,arrow};
}

function setCur(btn){
  currency=btn.dataset.cur;
  localStorage.setItem('crypto_cur',currency);
  document.querySelectorAll('.cur-btn').forEach(b=>b.classList.toggle('active',b.dataset.cur===currency));
  renderCoins();
}

async function fetchPrices(){
  if(!portfolio.length)return;
  const ids=portfolio.map(c=>c.id).join(',');
  const btn=document.getElementById('refresh-btn');
  const ind=document.getElementById('loading-indicator');
  const err=document.getElementById('error-banner');
  btn.disabled=true;btn.textContent='...';
  ind.style.display='flex';
  err.classList.remove('visible');

  try{
    const url=`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&sparkline=true&price_change_percentage=1h,24h,7d`;
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('CoinGecko API error: '+resp.status);
    const data=await resp.json();

    // Also fetch EUR and TRY rates if needed
    let rates={usd:1};
    try{
      const rr=await fetch('https://api.coingecko.com/api/v3/exchange_rates');
      const rd=await rr.json();
      rates.eur=rd.rates.eur?.value?1/rd.rates.eur.value:undefined;
      rates.try=rd.rates.try?.value?1/rd.rates.try.value:undefined;
      rates.btc=rd.rates.btc?.value?1/rd.rates.btc.value:undefined;
    }catch(e){}

    data.forEach(c=>{
      prices[c.id]={
        usd:c.current_price,
        eur:rates.eur?c.current_price*rates.eur:null,
        try:rates.try?c.current_price*rates.try:null,
        btc:rates.btc?c.current_price*rates.btc:null,
        change24h:c.price_change_percentage_24h,
        change1h:c.price_change_percentage_1h_in_currency,
        change7d:c.price_change_percentage_7d_in_currency,
        high24h:c.high_24h,
        low24h:c.low_24h,
        marketCap:c.market_cap,
        volume24h:c.total_volume,
        image:c.image,
        sparkline:c.sparkline_in_7d?.price||[]
      };
    });

    const now=new Date();
    document.getElementById('last-updated-text').textContent=
      'Updated '+now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

    renderCoins();
  }catch(e){
    err.textContent='Failed to fetch prices: '+e.message+'. Check your connection and try again.';
    err.classList.add('visible');
  }finally{
    btn.disabled=false;btn.textContent='↻ Refresh';
    ind.style.display='none';
  }
}

function sparklineSVG(data,up){
  if(!data||data.length<2)return '';
  const w=120,h=36;
  const min=Math.min(...data),max=Math.max(...data);
  const range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-(v-min)/range*h).toFixed(1)}`).join(' ');
  const col=up?'#4ade80':'#f05858';
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function renderCoins(){
  const el=document.getElementById('coin-list');
  if(!portfolio.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-state-icon">₿</div><div class="empty-state-text">No coins yet.<br>Tap + to add your first holding.</div></div>`;
    document.getElementById('total-val').textContent='—';
    document.getElementById('total-change').textContent='—';
    document.getElementById('total-pnl').textContent='—';
    document.getElementById('total-count').textContent='0 coins';
    return;
  }

  let totalVal=0,totalVal24hAgo=0,totalCost=0,hasAllPrices=true;

  const cards=portfolio.map(coin=>{
    const p=prices[coin.id];
    const curPrice=p?p[currency]:null;
    const usdPrice=p?p.usd:null;
    const change24=p?.change24h;
    const change7d=p?.change7d;
    const ch=fmtChange(change24);
    const ch7=fmtChange(change7d);

    // Portfolio value
    const holdingVal=curPrice&&coin.amount?curPrice*coin.amount:null;
    const holdingUsd=usdPrice&&coin.amount?usdPrice*coin.amount:null;
    if(holdingVal)totalVal+=holdingVal; else hasAllPrices=false;
    if(usdPrice&&coin.amount&&change24!==undefined){
      const prev=usdPrice/(1+change24/100);
      totalVal24hAgo+=prev*coin.amount;
    }

    // P&L
    let pnlStr='—',pnlCls='neutral';
    if(coin.buyPrice&&usdPrice&&coin.amount){
      const cost=coin.buyPrice*coin.amount;
      totalCost+=cost;
      const pnl=(usdPrice-coin.buyPrice)*coin.amount;
      const pnlPct=((usdPrice-coin.buyPrice)/coin.buyPrice)*100;
      pnlCls=pnl>=0?'up':'down';
      pnlStr=(pnl>=0?'+':'')+fmtPrice(pnl,'usd')+' ('+(pnl>=0?'+':'')+pnlPct.toFixed(2)+'%)';
    }

    const cardCls=change24>0?'up-card':change24<0?'down-card':'neutral-card';
    const spark=sparklineSVG(p?.sparkline?.slice(-48),change24>=0);

    return `<div class="coin-card ${cardCls}" onclick="openEditModal('${coin.id}')">
      <div class="coin-top">
        <div class="coin-icon">${p?.image?`<img src="${p.image}" alt="${coin.symbol}">`:'<span style="font-size:13px;font-weight:800;color:var(--accent)">${coin.symbol.slice(0,3)}</span>'}</div>
        <div class="coin-info">
          <div class="coin-name">${coin.name}</div>
          <div class="coin-symbol">${coin.symbol}</div>
        </div>
        <div class="coin-price-col">
          <div class="coin-price">${curPrice?fmtPrice(curPrice,currency):'—'}</div>
          <div class="coin-change ${ch.cls}"><span class="${ch.arrow||''}"></span>${ch.text}</div>
        </div>
      </div>

      ${spark?`<div class="sparkline">${spark}</div>`:''}

      <div class="coin-bottom">
        <div class="coin-stat">
          <div class="coin-stat-label">24h High</div>
          <div class="coin-stat-val">${p?.high24h?fmtPrice(p.high24h,currency,true):'—'}</div>
        </div>
        <div class="coin-stat">
          <div class="coin-stat-label">24h Low</div>
          <div class="coin-stat-val">${p?.low24h?fmtPrice(p.low24h,currency,true):'—'}</div>
        </div>
        <div class="coin-stat">
          <div class="coin-stat-label">7d Change</div>
          <div class="coin-stat-val ${ch7.cls}">${ch7.text}</div>
        </div>
      </div>

      ${coin.amount?`
      <div class="coin-holdings">
        <div class="coin-holdings-left">
          <div class="coin-holdings-label">Holdings</div>
          <div class="coin-holdings-amount">${coin.amount} ${coin.symbol}</div>
        </div>
        <div class="coin-holdings-right">
          <div class="coin-holdings-value">${holdingVal?fmtPrice(holdingVal,currency,true):'—'}</div>
          <div class="coin-holdings-pnl ${pnlCls}">${pnlStr}</div>
        </div>
      </div>`:''}`
    +'</div>';
  }).join('');

  el.innerHTML=cards;

  // Summary
  const totalChgAmt=totalVal-totalVal24hAgo;
  const totalChgPct=totalVal24hAgo?((totalVal/totalVal24hAgo)-1)*100:0;
  const chgCls=totalChgAmt>0?'up':totalChgAmt<0?'down':'neutral';
  document.getElementById('total-val').textContent=totalVal?fmtPrice(totalVal,currency,true):'—';
  const chSign=totalChgAmt>=0?'+':'';
  document.getElementById('total-change').innerHTML=`<span class="${chgCls}">${totalVal24hAgo?chSign+fmtPrice(totalChgAmt,currency,true)+' ('+chSign+totalChgPct.toFixed(2)+'%)':'—'}</span>`;

  if(totalCost>0&&totalVal){
    const pnl=totalVal-totalCost*(currency==='usd'?1:1);
    const pnlPct=((totalVal/totalCost)-1)*100;
    const pnlCls=pnl>=0?'up':'down';
    document.getElementById('total-pnl').innerHTML=`<span class="${pnlCls}">${pnl>=0?'+':''}${fmtPrice(pnl,currency,true)} (${pnl>=0?'+':''}${pnlPct.toFixed(2)}%)</span>`;
  } else {
    document.getElementById('total-pnl').textContent='—';
  }
  document.getElementById('total-count').textContent=portfolio.length+' coin'+(portfolio.length!==1?'s':'');
}

// ── SEARCH ──
let selectedCoinData=null;

function searchCoins(q){
  clearTimeout(searchTimer);
  const res=document.getElementById('search-results');
  if(!q||q.length<1){res.classList.remove('open');res.innerHTML='';return;}

  // Local search first
  const local=POPULAR.filter(c=>
    c.name.toLowerCase().includes(q.toLowerCase())||
    c.symbol.toLowerCase().includes(q.toLowerCase())
  ).slice(0,6);

  if(local.length){
    res.innerHTML=local.map(c=>`
      <div class="msearch-item" onclick="selectCoin('${c.id}','${c.symbol}','${c.name}')">
        <div class="msearch-sym">${c.symbol}</div>
        <div class="msearch-name">${c.name}</div>
      </div>`).join('');
    res.classList.add('open');
  }

  // API search after 400ms
  searchTimer=setTimeout(async()=>{
    try{
      if(searchCache[q]){showSearchResults(searchCache[q],res);return;}
      const r=await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(q)}`);
      const d=await r.json();
      const coins=d.coins?.slice(0,8)||[];
      searchCache[q]=coins;
      showSearchResults(coins,res);
    }catch(e){}
  },400);
}

function showSearchResults(coins,res){
  if(!coins.length)return;
  res.innerHTML=coins.map(c=>`
    <div class="msearch-item" onclick="selectCoin('${c.id}','${c.symbol.toUpperCase()}','${c.name.replace(/'/g,"\\'")}')">
      <div class="msearch-sym">${c.symbol.toUpperCase()}</div>
      <div class="msearch-name">${c.name}</div>
    </div>`).join('');
  res.classList.add('open');
}

function selectCoin(id,symbol,name){
  selectedCoinData={id,symbol,name};
  document.getElementById('coin-search').value=name;
  document.getElementById('search-results').classList.remove('open');
  const row=document.getElementById('selected-coin-row');
  document.getElementById('sel-name').textContent=name;
  document.getElementById('sel-sym').textContent=symbol;
  row.style.display='flex';
}

// ── MODAL ──
function openAddModal(){
  editingId=null;
  selectedCoinData=null;
  document.getElementById('modal-title').textContent='Add Coin';
  document.getElementById('coin-search').value='';
  document.getElementById('coin-amount').value='';
  document.getElementById('coin-buyprice').value='';
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('selected-coin-row').style.display='none';
  document.getElementById('del-coin-btn').style.display='none';
  document.getElementById('search-section').style.display='block';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('coin-search').focus(),300);
}

function openEditModal(id){
  const coin=portfolio.find(c=>c.id===id);
  if(!coin)return;
  editingId=id;
  selectedCoinData={id:coin.id,symbol:coin.symbol,name:coin.name};
  document.getElementById('modal-title').textContent='Edit '+coin.name;
  document.getElementById('search-section').style.display='none';
  document.getElementById('sel-name').textContent=coin.name;
  document.getElementById('sel-sym').textContent=coin.symbol;
  document.getElementById('selected-coin-row').style.display='flex';
  document.getElementById('coin-amount').value=coin.amount||'';
  document.getElementById('coin-buyprice').value=coin.buyPrice||'';
  document.getElementById('del-coin-btn').style.display='block';
  document.getElementById('modal-bg').classList.add('open');
}

function closeMod(e){
  if(!e||e.target===document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('open');
}

function saveCoin(){
  const amount=parseFloat(document.getElementById('coin-amount').value)||0;
  const buyPrice=parseFloat(document.getElementById('coin-buyprice').value)||null;

  if(editingId){
    const idx=portfolio.findIndex(c=>c.id===editingId);
    if(idx>-1){portfolio[idx].amount=amount;portfolio[idx].buyPrice=buyPrice;}
  } else {
    if(!selectedCoinData){
      document.getElementById('coin-search').style.borderColor='var(--danger)';return;
    }
    if(portfolio.find(c=>c.id===selectedCoinData.id)){
      // Update existing
      const idx=portfolio.findIndex(c=>c.id===selectedCoinData.id);
      portfolio[idx].amount=amount;portfolio[idx].buyPrice=buyPrice;
    } else {
      portfolio.push({id:selectedCoinData.id,symbol:selectedCoinData.symbol,name:selectedCoinData.name,amount,buyPrice});
    }
  }

  localStorage.setItem('crypto_portfolio',JSON.stringify(portfolio));
  document.getElementById('modal-bg').classList.remove('open');
  renderCoins();
  fetchPrices();
}

function deleteCoin(){
  portfolio=portfolio.filter(c=>c.id!==editingId);
  localStorage.setItem('crypto_portfolio',JSON.stringify(portfolio));
  document.getElementById('modal-bg').classList.remove('open');
  renderCoins();
}

// Auto-refresh every 60 seconds
setInterval(()=>{if(portfolio.length)fetchPrices();},60000);

// Init
renderCoins();
if(portfolio.length)fetchPrices();

// Restore currency
document.querySelectorAll('.cur-btn').forEach(b=>b.classList.toggle('active',b.dataset.cur===currency));
</script>
